<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
  <header class="topbar">
    <h1>{{ title }}</h1>
    <span class="readonly-badge">Read-only Dashboard</span>
  </header>
  <nav class="nav">
    <a href="/dashboard">Overview</a>
    <a href="/dashboard/tasks">Tasks</a>
    <a href="/dashboard/reviews">Reviews</a>
    <a href="/dashboard/system">System</a>
    {% if dashboard_auth_enabled %}<a href="/dashboard/logout">Logout</a>{% endif %}
  </nav>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    <p>本頁僅讀取 /queue/* observability 資料，不會修改任何 queue 狀態。</p>
  </footer>
</body>
</html>
